---
services:
  app:
    build:
      context: ./services/app
      dockerfile: Dockerfile

    # Mount the shared named volumes.
    volumes:
      - pnpm_store:/home/developer/.pnpm-store
      - nix_store:/nix
      # Mount the project root to the workspace folder
      - ..:/home/developer/project:cached

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC

    # Ensure sidecars are started and healthy.
    depends_on:
      nix:
        condition: service_healthy
      pnpm:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

    # The entrypoint in Dockerfile handles setup and keeps the container running.
    # We remove the command override to allow the ENTRYPOINT/CMD to execute.
    # command: sleep infinity

  # Nix sidecar service - manages the Nix store and caching
  nix:
    build:
      context: ./services/nix-sidecar
      dockerfile: Dockerfile
    container_name: dev-nix-sidecar
    privileged: true
    restart: unless-stopped
    volumes:
      - nix_store:/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: sleep infinity

  # Rust sidecar for Rust toolchain
  rust:
    build:
      context: ./services/rust-sidecar
      dockerfile: Dockerfile
    container_name: dev-rust-sidecar
    restart: unless-stopped
    depends_on:
      nix:
        condition: service_healthy
    volumes:
      - nix_store:/nix
      - rust_cargo_cache:/home/developer/.cargo
      - rust_rustup_cache:/home/developer/.rustup
    environment:
      - TZ=UTC
      - PUID=1000
      - PGID=1000
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: sleep infinity

  # PHP sidecar for PHP tooling
