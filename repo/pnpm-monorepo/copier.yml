# Template variables
_defaults:
  monorepo_name: "my-monorepo"
  project_name: "my-monorepo"
  boilerplate_name: "pnpm-monorepo"
  description: "A pnpm-based monorepo with turbo"

# Questions
monorepo_name:
  type: str
  help: "What is your monorepo name?"

project_name:
  type: str
  help: "Project name (defaults to monorepo_name)"

boilerplate_name:
  type: str
  help: "Boilerplate name (for documentation)"

description:
  type: str
  help: "Monorepo description"

# Template configuration
_templates_suffix: ".jinja"
_ignore:
  - "node_modules"
  - ".next"
  - "dist"
  - "out"
  - ".git"
  - "__pycache__"
  - "*.pyc"
