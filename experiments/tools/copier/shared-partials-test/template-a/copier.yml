# Template A - Uses shared partials

_min_copier_version: "9.0.0"
_subdirectory: files
_templates_suffix: .jinja

project_name:
  type: str
  default: template-a-project
  help: Name of the project

environment:
  type: str
  default: development
  help: Environment type

template_type:
  type: str
  default: web-app
  help: Type of template being generated
