_min_copier_version: "9.0.0"
_subdirectory: files
_templates_suffix: .jinja
package_name:
  type: str
  help: Name of the package (kebab-case)
package_description:
  type: str
  help: Short description of the package
category:
  type: str
  help: "Package category (features|services|core|ui)"
domain:
  type: str
  help: "Business domain or technical capability (e.g. auth, commerce)"
author_name:
  type: str
  help: Author name
  default: "levonk"
author_email:
  type: str
  help: Author email
  default: "levonk@example.com"
license:
  type: str
  help: License for the package
  default: "MIT"
python_version:
  type: str
  help: Python version
  default: "3.11"
include_tests:
  type: bool
  help: Include test framework setup?
  default: true
include_ci:
  type: bool
  help: Include CI/CD configuration?
  default: true
