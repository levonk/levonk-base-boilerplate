_min_copier_version: "9.0.0"
_subdirectory: files
_templates_suffix: .jinja

# Basic project information
package_name:
  type: str
  help: What is the human-readable package name? (e.g., "My Awesome Library")
  validate: |
    {% if not package_name|regex_match('^[a-zA-Z][a-zA-Z0-9\-_\s]*$') %}
    Package name must start with a letter and contain only letters, numbers, hyphens, underscores, and spaces.
    {% endif %}

package_slug:
  type: str
  help: What is the package slug? (e.g., "my-awesome-library")
  default: "{{ package_name | lower | replace(' ', '-') | replace('_', '-') }}"
  validate: |
    {% if not package_slug|regex_match('^[a-z][a-z0-9-]*$') %}
    Package slug must be lowercase, start with a letter, and use hyphens instead of spaces/underscores.
    {% endif %}

namespace_name:
  type: str
  help: What is the C# namespace? (e.g., "MyAwesomeLibrary")
  default: "{{ package_name | replace(' ', '') | replace('-', '') }}"

description:
  type: str
  help: Short description of the package
  default: "A C# package"

author_name:
  type: str
  help: Author name
  default: "Your Name"

author_email:
  type: str
  help: Author email
  default: "your.email@example.com"

license:
  type: str
  help: License type
  choices:
    - AGPL-3.0
    - MIT
    - Apache-2.0
    - MPL-2.0
  default: "AGPL-3.0"

repository_url:
  type: str
  help: Repository URL
  default: "https://github.com/yourusername/{{ package_slug }}"

# C# specific settings
target_framework:
  type: str
  help: Target .NET framework
  default: "net8.0"

project_type:
  type: str
  help: Project type
  choices:
    - classlib
    - console
    - webapi
    - mstest
  default: "classlib"

# Feature flags
include_tests:
  type: bool
  help: Include test framework setup?
  default: true

include_ci:
  type: bool
  help: Include CI/CD configuration?
  default: true

include_docker:
  type: bool
  help: Include Docker configuration?
  default: false

include_analyzers:
  type: bool
  help: Include Roslyn analyzers?
  default: true

# Dependencies
keywords:
  type: str
  help: Comma-separated keywords
  default: "csharp,dotnet,library"
