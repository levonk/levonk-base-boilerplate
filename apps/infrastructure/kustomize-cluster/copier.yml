_min_copier_version: "9.0.0"
_subdirectory: files
_templates_suffix: .jinja

project_name:
  type: str
  help: "Existing GitOps project name (kebab-case)"
  default: "my-gitops-project"

cluster_name:
  type: str
  help: "New cluster name"
  default: "mycluster"

author_name:
  type: str
  help: "Author name"
  default: "Your Name"

author_email:
  type: str
  help: "Author email"
  default: "your.email@example.com"
