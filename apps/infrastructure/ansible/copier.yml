_min_copier_version: "9.0.0"
_subdirectory: files
_templates_suffix: .jinja

package_name:
  type: str
  help: "Ansible project name (kebab-case)"
  default: "my-ansible-project"

description:
  type: str
  help: "Short description"
  default: "Ansible automation project"

author_name:
  type: str
  help: "Author name"
  default: "Your Name"

author_email:
  type: str
  help: "Author email"
  default: "your.email@example.com"
