_min_copier_version: "9.0.0"
_subdirectory: files
_templates_suffix: .jinja

package_name:
  type: str
  help: "FluxCD project name (kebab-case)"
  default: "my-fluxcd"

app_name:
  type: str
  help: "Application name"
  default: "myapp"

repo_url:
  type: str
  help: "Git repository URL"
  default: "https://github.com/myorg/gitops"

description:
  type: str
  help: "Short description"
  default: "FluxCD Kustomization manifests"

author_name:
  type: str
  help: "Author name"
  default: "Your Name"

author_email:
  type: str
  help: "Author email"
  default: "your.email@example.com"
