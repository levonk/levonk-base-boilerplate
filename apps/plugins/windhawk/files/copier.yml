_min_copier_version: "9.0.0"
_subdirectory: files
_templates_suffix: .jinja

plugin_id:
  type: str
  help: "Unique ID for the plugin (e.g. taskbar-search-hide)"

package_name:
  type: str
  help: "Display name of the plugin"

plugin_description:
  type: str
  help: "Short description of what the plugin does"

plugin_version:
  type: str
  default: "0.1"

author_name:
  type: str
  help: "Your name"

author_github:
  type: str
  help: "Your GitHub URL"
  default: ""

author_twitter:
  type: str
  help: "Your Twitter URL"
  default: ""

author_homepage:
  type: str
  help: "Your personal homepage"
  default: ""

target_process:
  type: str
  help: "Process to include (e.g. explorer.exe, mspaint.exe, *)"
  default: "explorer.exe"

compiler_options:
  type: str
  help: "Compiler options (e.g. -lcomdlg32)"
  default: ""
