_min_copier_version: "9.0.0"
_subdirectory: files
_templates_suffix: .jinja

package_name:
  type: str
  help: What is the project name?
  default: "my-cli-tool"

project_slug:
  type: str
  help: What is the project slug? (e.g. my-tool)
  default: "{{ project_name | lower | replace(' ', '-') }}"

description:
  type: str
  help: Short description of the project
  default: "A CLI tool"

rust_log_level:
  type: str
  help: Rust log level for development
  default: "info"

rust_backtrace:
  type: str
  help: Rust backtrace setting for development
  default: "1"

include_openssl:
  type: bool
  help: Include OpenSSL for TLS support?
  default: false

include_postgres:
  type: bool
  help: Include PostgreSQL support?
  default: false

include_sqlite:
  type: bool
  help: Include SQLite support?
  default: false

include_http_server:
  type: bool
  help: Include HTTP server capabilities?
  default: false

http_port:
  type: int
  help: Default HTTP port for the server
  default: 8080

include_redis:
  type: bool
  help: Include Redis support?
  default: false
