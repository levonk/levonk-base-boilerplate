package_name:
_subdirectory: files
_templates_suffix: .jinja
  type: str
  help: What is the project name?
  default: "my-cli-tool"

package_slug:
  type: str
  help: What is the project slug? (e.g. my-tool)
  default: "{{ project_name | lower | replace(' ', '-') }}"

description:
  type: str
  help: Short description of the project
  default: "A CLI tool"

version:
  type: str
  help: Initial version of the project
  default: "1.0.0"
