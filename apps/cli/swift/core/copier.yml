project_name:
  type: str
  help: What is the project name?
  default: "my-cli-tool"

project_slug:
  type: str
  help: What is the project slug? (e.g. my_tool)
  default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"

description:
  type: str
  help: Short description of the project
  default: "A CLI tool"

version:
  type: str
  help: Initial version of the project
  default: "0.1.0"

_subdirectory: files
_templates_suffix: ".jinja"
