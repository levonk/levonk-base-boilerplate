package_name:
_subdirectory: files
_templates_suffix: .jinja
  type: str
  help: What is the project name?
  default: "my-cli-tool"

package_slug:
  type: str
  help: What is the project slug? (e.g. my-tool)
  default: "{{ project_name | lower | replace(' ', '-') }}"

version:
  type: str
  help: Project version
  default: "1.0.0"

description:
  type: str
  help: Short description of the project
  default: "A CLI tool"

# Devbox configuration
dotnet_version:
  type: str
  help: .NET version
  default: "8.0"

dotnet_environment:
  type: str
  help: .NET environment
  default: "Development"

include_commandline:
  type: bool
  help: Include System.CommandLine?
  default: false

include_mcguiver:
  type: bool
  help: Include McGuiver CLI framework?
  default: false

include_cocona:
  type: bool
  help: Include Cocona CLI framework?
  default: false

include_serilog:
  type: bool
  help: Include Serilog for logging?
  default: false

include_newtonsoft:
  type: bool
  help: Include Newtonsoft.Json?
  default: false

include_system_text_json:
  type: bool
  help: Include System.Text.Json?
  default: false

include_yaml:
  type: bool
  help: Include YamlDotNet?
  default: false

include_httpclient:
  type: bool
  help: Include HttpClient support?
  default: false

include_openssl:
  type: bool
  help: Include OpenSSL support?
  default: false

include_postgres:
  type: bool
  help: Include PostgreSQL support?
  default: false

include_mysql:
  type: bool
  help: Include MySQL support?
  default: false

include_sqlite:
  type: bool
  help: Include SQLite support?
  default: false

include_development:
  type: bool
  help: Include development environment variables?
  default: false

log_level:
  type: str
  help: Log level for development
  default: "Information"

debug:
  type: str
  help: Debug flag for development
  default: "true"

config_file:
  type: str
  help: Configuration file path
  default: "./config.json"
